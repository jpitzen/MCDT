apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlaws-nginx
  namespace: zlaws
  labels:
    app: zlaws-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zlaws-nginx
  template:
    metadata:
      labels:
        app: zlaws-nginx
    spec:
      containers:
      - name: nginx
        image: zlaws-nginx:v1
        imagePullPolicy: Never  # For Minikube local images
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-logs
          mountPath: /var/log/nginx
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zlaws-nginx
  namespace: zlaws
  labels:
    app: zlaws-nginx
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  selector:
    app: zlaws-nginx
