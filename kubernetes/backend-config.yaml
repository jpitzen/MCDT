apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: zlaws
data:
  NODE_ENV: development
  PORT: "5000"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: zlaws_db
  DB_USER: zlaws_user
  LOG_LEVEL: info
  ENABLE_AUDIT_LOG: "true"
  CREDENTIAL_ROTATION_INTERVAL: "2592000"
  SESSION_TIMEOUT: "3600"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: zlaws
type: Opaque
stringData:
  DB_PASSWORD: "ZLAWSSecurePass123!"
  JWT_SECRET: "zlaws_jwt_secret_key_development_12345678"
  ENCRYPTION_KEY: "zlaws_encryption_key_32_chars_12345678"
  REFRESH_TOKEN_SECRET: "zlaws_refresh_token_secret_development"
  API_KEY_SALT: "zlaws_api_key_salt_development_key"
