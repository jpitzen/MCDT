apiVersion: v1
kind: PersistentVolume
metadata:
  name: zk-config-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: default
    name: zk-config-efs
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-04e20509bb24eaf4f:/zookeeper/config
