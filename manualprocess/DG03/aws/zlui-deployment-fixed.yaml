apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: zlui
    name: zlui
  name: zlui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zlui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zlui
    spec:
      containers:
      - env:
        - name: CLUSTER_NAME
          value: UI
        - name: INITIAL_EXECUTORS
          value: "5"
        - name: SERVICE_EXECUTORS
          value: "5"
        - name: MANAGED_EXECUTORS
          value: "5"
        - name: JAVA_HOME
          value: /usr/lib/jvm/java-21-openjdk-amd64
        - name: PATH
          value: /usr/lib/jvm/java-21-openjdk-amd64/bin:/usr/local/tomcat/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: TIKA_HOST
          value: zltika-service
        - name: KAFKA_OPTS
          value: -Djava.security.auth.login.config=/opt/ZipLip/zlserver/WEB-INF/config/zookeeper_jaas.conf
        envFrom:
        - configMapRef:
            name: zlapp-config
        - configMapRef:
            name: db-config
        - secretRef:
            name: db-secret
        image: 995553364920.dkr.ecr.us-east-1.amazonaws.com/ue1-zlps-ecr-01:zlserver-k8s-20251222
        imagePullPolicy: IfNotPresent
        name: zlui
        ports:
        - containerPort: 80
          name: http
        resources:
          limits:
            cpu: "1000m"
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - mountPath: /opt/ZipLip/zlserver/WEB-INF/tmp
          name: zltikatemp
        - mountPath: /opt/ZipLip/logs
          name: zluilogs
        - mountPath: /var/opt/zlvault
          name: zlvault
        - mountPath: /opt/ZipLip/bin/zk/tcdb.cfg
          name: zkclient-config
          subPath: tcdb.cfg
        - mountPath: /opt/ZipLip/ZLZooKeeper/config/zkQuorum.cfg
          name: zkclient-config
          subPath: zkQuorum.cfg
        # Override pmappURL.cfg with custom domain and SSL settings
        - mountPath: /opt/ZipLip/config/pmappURL.cfg
          name: pmappurl-config
          subPath: pmappURL.cfg
        # Override server.xml to set proxyName/proxyPort so Tomcat reports
        # the correct hostname/scheme behind the AWS Load Balancer
        - mountPath: /usr/local/tomcat/conf/server.xml
          name: tomcat-server-config
          subPath: server.xml
      imagePullSecrets:
      - name: docker-secret
      serviceAccountName: zlapp-sa
      volumes:
      - emptyDir: {}
        name: zltikatemp
      - name: zluilogs
        persistentVolumeClaim:
          claimName: zluilogs-efs
      - name: zlvault
        persistentVolumeClaim:
          claimName: zlvault-efs
      - configMap:
          name: zkclient-config
        name: zkclient-config
      # ConfigMap containing the corrected pmappURL.cfg
      - configMap:
          name: pmappurl-config
        name: pmappurl-config
      # ConfigMap containing server.xml with proxyName/proxyPort
      - configMap:
          name: tomcat-server-config
        name: tomcat-server-config
