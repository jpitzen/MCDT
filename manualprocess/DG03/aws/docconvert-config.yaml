apiVersion: v1
data:
  DocumentConversion.xml: "<Sheet>\n<SheetName>DocumentConversion</SheetName>\n<SheetDisplayName>Document
    Conversion</SheetDisplayName>\n<SheetDesc><![CDATA[Document conversion settings]]></SheetDesc>\n\n<!--
    Global Conversion Settings -->\n<Group>\n   <GroupName>Global Document Conversion
    Settings</GroupName>\n   <GroupDisplayName>Global Document Conversion Settings</GroupDisplayName>\n
    \  <GroupDesc><![CDATA[Settings for Document Conversion. These settings apply
    to all types document conversions]]></GroupDesc>\n\n\t<Bean>\n     <BeanName>DOCCONVERSION_FILEDETECT_ON</BeanName>\n
    \    <BeanDisplayName>Enable file type detection for document conversion</BeanDisplayName>\n
    \    <BeanValue>false</BeanValue>\n     <BeanType>PreprocessDefine</BeanType>\n
    \    <BeanInputType caption=\"true\">CHECKBOX</BeanInputType>\n     <BeanChoices>\n
    \      <Choice value=\"true\"></Choice>\n     </BeanChoices>\n     <BeanHelp><![CDATA[Enable
    best-effort file type detection for documents. This setting will force detection
    of file type based on the file magic headers to determine whether the files are
    what their extensions or mime-types declare them to be. Enable this setting if
    the environment has files/attachments with incorrect extensions or mimetypes.
    Enabling this setting has a minor performance impact.]]></BeanHelp>\n   </Bean>\n\n</Group>\n\n<!--
    //Tika Service Manager -->\n<Group>\n\t<GroupName>ZLTika Service Settings</GroupName>\n\t<GroupDisplayName>ZLTika
    Service Settings</GroupDisplayName>\n\t<GroupDesc><![CDATA[Setting related to
    the ZLTika Doc Conversion Service.]]></GroupDesc>\n\n\n\n\t<Bean>\n\t\t<BeanName>__tika.ZLTikaService.Host</BeanName>\n\t\t<BeanDisplayName>Tika
    Service Host</BeanDisplayName>\n\t\t<BeanValue>zltika</BeanValue>\n\t\t<BeanType>String</BeanType>\n\t\t<BeanInputType>TEXT</BeanInputType>\n\t\t<BeanHelp><![CDATA[Location
    of Tika doc conversion service/process.]]></BeanHelp>\n\t</Bean>\n\n\t<Bean>\n\t\t<BeanName>__tika.ZLTikaService.Port</BeanName>\n\t\t<BeanDisplayName>ZL
    Tika  Port</BeanDisplayName>\n\t\t<BeanValue>9972</BeanValue>\n\t\t<BeanType>Integer</BeanType>\n\t\t<BeanInputType
    size=\"6\">TEXT</BeanInputType>\n\t\t<BeanHelp><![CDATA[Port number where the
    Tika Doc Conversion server is listening.]]></BeanHelp>\n\t</Bean>\n"
  TIKA_HOST: zltika
  TIKA_PORT: "9972"
