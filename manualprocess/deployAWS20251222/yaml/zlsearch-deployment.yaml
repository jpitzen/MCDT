# ZLSearch Deployment for AWS EKS
# *** IMAGE CHANGE: Uses zlserver:k8s-20251222 (same base as zlserver) ***
# CLUSTER_NAME: SEARCH
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlsearch
  labels:
    name: zlsearch
    app: zlsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zlsearch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zlsearch
    spec:
      serviceAccountName: zlapp-sa
      imagePullSecrets:
        - name: docker-secret
      containers:
        - name: zlsearch
          # Using K8s-optimized image with Java 21
          image: 995553364920.dkr.ecr.us-east-1.amazonaws.com/ue1-zlps-ecr-01:zlserver-k8s-20251222
          imagePullPolicy: IfNotPresent
          env:
            - name: CLUSTER_NAME
              value: "SEARCH"
            - name: INITIAL_EXECUTORS
              value: "5"
            - name: SERVICE_EXECUTORS
              value: "5"
            - name: MANAGED_EXECUTORS
              value: "5"
            - name: JAVA_HOME
              value: "/usr/lib/jvm/java-21-openjdk-amd64"
            - name: PATH
              value: "/usr/lib/jvm/java-21-openjdk-amd64/bin:/usr/local/tomcat/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: TIKA_HOST
              value: "zltika-service"
            - name: KAFKA_OPTS
              value: "-Djava.security.auth.login.config=/opt/ZipLip/zlserver/WEB-INF/config/zookeeper_jaas.conf"
          envFrom:
            - configMapRef:
                name: zlapp-config
            - configMapRef:
                name: db-config
            - secretRef:
                name: db-secret
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: zlsearchtemp
              mountPath: /opt/ZipLip/zlserver/WEB-INF/tmp
            - name: zlsearchlogs
              mountPath: /opt/ZipLip/logs
            - name: zlvault
              mountPath: /var/opt/zlvault
            - name: zkclient-config
              mountPath: /opt/ZipLip/bin/zk/tcdb.cfg
              subPath: tcdb.cfg
            - name: zkclient-config
              mountPath: /opt/ZipLip/ZLZooKeeper/config/zkQuorum.cfg
              subPath: zkQuorum.cfg
      volumes:
        - name: zlsearchtemp
          emptyDir: {}
        - name: zlsearchlogs
          emptyDir: {}
        - name: zlvault
          persistentVolumeClaim:
            claimName: zlvault-efs
        - name: zkclient-config
          configMap:
            name: zkclient-config
---
apiVersion: v1
kind: Service
metadata:
  name: zlsearch
  labels:
    app: zlsearch
spec:
  selector:
    app: zlsearch
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
