# AWS Storage Classes for EKS
# Defines EFS (shared) and EBS (block) storage classes
---
# EFS StorageClass - For ReadWriteMany (RWX) shared storage
# Used by: zlvault-pvc, zlserverlogs-pvc, zltemp-pvc
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: fs-XXXXXXXXX  # REPLACE with your EFS filesystem ID
  directoryPerms: "755"
  gidRangeStart: "1000"
  gidRangeEnd: "2000"
  basePath: "/dynamic_provisioning"
reclaimPolicy: Retain
volumeBindingMode: Immediate
---
# EBS StorageClass - For ReadWriteOnce (RWO) block storage
# Used by: ZooKeeper StatefulSet volumeClaimTemplates
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  fsType: ext4
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
