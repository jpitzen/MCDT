# ZLZooKeeper StatefulSet for AWS EKS
# Uses original image with init container for myid creation
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zlzookeeper
  labels:
    app: zlzookeeper
spec:
  serviceName: zk-hs
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: zlzookeeper
  template:
    metadata:
      labels:
        app: zlzookeeper
    spec:
      serviceAccountName: zlapp-sa
      imagePullSecrets:
        - name: docker-secret
      initContainers:
        # Init container to create myid file from StatefulSet ordinal
        - name: init-myid
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              ORDINAL=$(echo $HOSTNAME | sed 's/.*-//')
              MYID=$((ORDINAL + 1))
              echo "Creating myid=$MYID for $HOSTNAME"
              mkdir -p /data
              echo $MYID > /data/myid
              cat /data/myid
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: zlzkdata
              mountPath: /data
      containers:
        - name: zlzookeeper
          # Using original ZLZooKeeper image (has working zlzk.sh startup)
          image: 995553364920.dkr.ecr.us-east-1.amazonaws.com/ue1-zlps-ecr-01:zlzookeeper11.1.0-b1140
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2181
              name: client
            - containerPort: 2888
              name: server
            - containerPort: 3888
              name: leader-election
          env:
            - name: ZOO_SERVERS
              value: "zlzookeeper-0 zlzookeeper-1 zlzookeeper-2"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: zlzkdata
              mountPath: /var/ZipLip/DATA/ZooKeeper
            - name: zk-config
              mountPath: /opt/ZipLip/ZLZooKeeper/config/zk.cfg
              subPath: zk.cfg
            - name: zk-config
              mountPath: /opt/ZipLip/ZLZooKeeper/config/zkQuorum.cfg
              subPath: zkQuorum.cfg
          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: zk-config
          configMap:
            name: zk-config
  volumeClaimTemplates:
    - metadata:
        name: zlzkdata
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-sc
        resources:
          requests:
            storage: 10Gi
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: zk-hs
  labels:
    app: zlzookeeper
spec:
  ports:
    - port: 2181
      name: client
    - port: 2888
      name: server
    - port: 3888
      name: leader-election
  clusterIP: None
  selector:
    app: zlzookeeper
---
# Client service for ZooKeeper access
apiVersion: v1
kind: Service
metadata:
  name: zk-cs
  labels:
    app: zlzookeeper
spec:
  ports:
    - port: 2181
      name: client
  selector:
    app: zlzookeeper
