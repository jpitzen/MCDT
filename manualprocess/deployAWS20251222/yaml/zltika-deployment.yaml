# ZLTika Deployment for AWS EKS
# Using original zltika image (K8s startup script had jar manifest issue)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zltika
  labels:
    name: zltika
    app: zltika
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zltika
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zltika
    spec:
      serviceAccountName: zlapp-sa
      imagePullSecrets:
        - name: docker-secret
      containers:
        - name: zltika
          # Using original image - K8s optimized had startup issues
          image: 995553364920.dkr.ecr.us-east-1.amazonaws.com/ue1-zlps-ecr-01:zltika11.1.0-b1140
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9972
              name: tika
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # Health check using tcp socket (port 9972)
          livenessProbe:
            tcpSocket:
              port: 9972
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9972
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zltika
  labels:
    app: zltika
spec:
  selector:
    app: zltika
  ports:
    - port: 9972
      targetPort: 9972
      name: tika
  type: ClusterIP
