# ZL ConfigMaps - us-east-1
# Last Updated: December 22, 2025
---
# Database Configuration ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
data:
  DB_HOST: use1-zlps-msexpsql-01-eks.cqhaqqqiwngv.us-east-1.rds.amazonaws.com
  DB_PORT: "1433"
  DB_NAME: ZLDB
  DB_TYPE: mssql
  DB_USER: pfuser
---
# ZooKeeper Client Configuration ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: zkclient-config
data:
  # tc.cfg - Machine/Site Configuration for ZooKeeper
  tc.cfg: |
    // Machine/Site Configuration for ZooKeeper
    // This config loads site parameters into ZooKeeper at tc/K8S

    _cfg.machine=tc/K8S

    _cfg.param.pmApp.site.name  = K8S
    _cfg.param.coord.cluster.default.name  = DEFAULT
    _cfg.param.coord.cluster.initial.executors = 5
    _cfg.param.coord.cluster.service.executors = 3
    _cfg.param.coord.cluster.managed.executors = 3

    acv.mach=#wsi.config.AllConfigVariables~~@NAMES_THAT_START_WITH@~~_cfg.param.

    _tc = #com.zlti.zlzookeeper.ZKConfigFactory~~@_cfg.machine@~~@acv.mach@

  # tcdb.cfg - Database Protected Key Configuration
  # IMPORTANT: TrustServerCertificate=true is REQUIRED for JDBC connectivity
  tcdb.cfg: |
    // Database Protected Key Configuration for ZooKeeper
    // EDIT THIS SECTION

    #define DB_ORACLE_DEFAULT   = false
    #define DB_MSSQL_DEFAULT    = true
    #define DB_PGSQL_DEFAULT    = false
    #define DB_SYBASE_DEFAULT   = false
    #define DB_DB2_DEFAULT      = false
    #define DB_MYSQL_DEFAULT    = false
    #define DB_HSQLDB_DEFAULT   = false

    _db.param.user  = pfuser
    _db.password    = LJZ-wkVv@t_!d*PiM2tbx3TZ4h

    //Default MSSQL URL
    // *** FIX: Added TrustServerCertificate=true for JDBC driver compatibility ***
    #if DB_MSSQL_DEFAULT
    _db.param.jdbcUrl=jdbc:sqlserver://use1-zlps-msexpsql-01-eks.cqhaqqqiwngv.us-east-1.rds.amazonaws.com:1433;TrustServerCertificate=true
    _db.param.DatabaseName=ZLDB
    #endif

    // DO NOT EDIT BELOW THIS LINE
    acv.db=#wsi.config.AllConfigVariables~~@NAMES_THAT_START_WITH@~~_db.param.
    _db.KeyName = zltc/db
    _tcdb = #com.zlti.zlzookeeper.ZKProtectedKeyFactory~~@_db.KeyName@~~@_db.password@~~@acv.db@

  # zkClient.cfg - ZooKeeper Client Configuration
  zkClient.cfg: |
    // ZooKeeper Client Configuration for zkutil commands
    // This file tells zkutil where to find the quorum config and how to connect

    _zkCluster = /opt/ZipLip/ZLZooKeeper/config/zkQuorum.cfg

    __zk.main=#com.zlti.zlzookeeper.ZLZooKeeper~~@_zkCluster@~~3000~~true

  # zkQuorum.cfg - ZooKeeper Quorum Configuration
  # After setting up the zookeeper pods successfully, run the following from zlui (or your first server pod)
  # kubectl get pods (get the pod name)
  # then execute:
  # kubectl exec zlui-8fbfbcbf6-dvh56 -- bash -c 'cd /opt/ZipLip/bin/zk && java -classpath "/opt/ZipLip/zlserver/WEB-INF/lib/*" com.zlti.zlzookeeper.ZKUtil -k zkClient.cfg'
  
  zkQuorum.cfg: |
    #if !_ZK_SERVER_CONFIG_FILE_IS_INCLUDED
    #define _ZK_SERVER_CONFIG_FILE_IS_INCLUDED = true

    // ZooKeeper Authentication Key - Generated via zkutil -g
    _zlzk.auth=#com.zlti.zlzookeeper.ZLZKAuth~~Zh2CX0aZm7f+tRNic77CKvCtYwrxz8Nt7QY1y1T6B5AV4tcMVWGBf4J2Lei/JSDU9KKPspAK2nYPUJF7mQmIVg==

    // ZooKeeper Quorum Configuration for Kubernetes
    // Format: id,machine,clientPort,peerPort,electionPort,dataDir,[hostname]
    zkQuorum.0=0~~zlzookeeper-0.zk-hs.default.svc.cluster.local~~2181~~2888~~3888~~/var/ZipLip/DATA/ZooKeeper/zk0
    zkQuorum.1=1~~zlzookeeper-1.zk-hs.default.svc.cluster.local~~2181~~2888~~3888~~/var/ZipLip/DATA/ZooKeeper/zk1
    zkQuorum.2=2~~zlzookeeper-2.zk-hs.default.svc.cluster.local~~2181~~2888~~3888~~/var/ZipLip/DATA/ZooKeeper/zk2
    acv.zkQuorum=#wsi.config.AllConfigVariables~~@NAMES_THAT_START_WITH@~~zkQuorum.
    #endif
---
# ZooKeeper Server Configuration ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: zk-config
data:
  # zk.cfg - ZooKeeper Server Main Configuration
  zk.cfg: |
    // ZooKeeper Server Configuration
    #define _ZK_SERVER_CONFIG_FILE_IS_INCLUDED = true

    // Include quorum configuration
    _zkQuorumConfig = /opt/ZipLip/ZLZooKeeper/config/zkQuorum.cfg

    // ZooKeeper Server Settings
    _zk.dataDir = /var/ZipLip/DATA/ZooKeeper
    _zk.tickTime = 2000
    _zk.initLimit = 10
    _zk.syncLimit = 5
    _zk.maxClientCnxns = 60

    // Logging
    _zk.log.level = INFO

  # zkQuorum.cfg - ZooKeeper Quorum Configuration (shared)
  zkQuorum.cfg: |
    #if !_ZK_SERVER_CONFIG_FILE_IS_INCLUDED
    #define _ZK_SERVER_CONFIG_FILE_IS_INCLUDED = true

    // ZooKeeper Authentication Key - Generated via zkutil -g
    _zlzk.auth=#com.zlti.zlzookeeper.ZLZKAuth~~Zh2CX0aZm7f+tRNic77CKvCtYwrxz8Nt7QY1y1T6B5AV4tcMVWGBf4J2Lei/JSDU9KKPspAK2nYPUJF7mQmIVg==

    // ZooKeeper Quorum Configuration for Kubernetes
    // Format: id,machine,clientPort,peerPort,electionPort,dataDir,[hostname]
    zkQuorum.0=0~~zlzookeeper-0.zk-hs.default.svc.cluster.local~~2181~~2888~~3888~~/var/ZipLip/DATA/ZooKeeper/zk0
    zkQuorum.1=1~~zlzookeeper-1.zk-hs.default.svc.cluster.local~~2181~~2888~~3888~~/var/ZipLip/DATA/ZooKeeper/zk1
    zkQuorum.2=2~~zlzookeeper-2.zk-hs.default.svc.cluster.local~~2181~~2888~~3888~~/var/ZipLip/DATA/ZooKeeper/zk2
    acv.zkQuorum=#wsi.config.AllConfigVariables~~@NAMES_THAT_START_WITH@~~zkQuorum.
    #endif
---
# ZL Application Configuration ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: zlapp-config
data:
  ZLApp.cfg: |
    // ZLApp Configuration File
    // Application startup configuration for ZLServer pods

    #ifndef _ZL_APP_CONFIG_FILE_IS_INCLUDED
    #define _ZL_APP_CONFIG_FILE_IS_INCLUDED = true

    // Include ZooKeeper configuration
    _zkClientConfig = /opt/ZipLip/ZLZooKeeper/config/zkClient.cfg

    // Site Configuration
    _cfg.site.name = K8S

    // Cluster Configuration - Set via CLUSTER_NAME environment variable
    // Values: MP (zlserver), UI (zlui), SEARCH (zlsearch)
    // _cfg.cluster.name = MP

    // Thread Pool Settings
    _cfg.thread.pool.core = 10
    _cfg.thread.pool.max = 50
    _cfg.thread.pool.queue = 100

    // Memory Settings
    _cfg.memory.min = 512m
    _cfg.memory.max = 4g

    // Logging
    _cfg.log.level = INFO
    _cfg.log.dir = /var/opt/zlserverlogs

    #endif
---
# Document Conversion ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: docconvert-config
data:
  TIKA_HOST: zltika
  TIKA_PORT: "9972"
